# Hero
# ============================================================
[hero]
eyebrow      = "open source · Scala Native"
headline     = "A video editor built for typeset lower thirds."
subheadline  = "kutter is a fixed-track NLE in the shape of kdenlive or Resolve — but its reason for being is automated, typeset lower thirds: a batch of name/title cards, set by the texish engine, faded in and out over your footage."
