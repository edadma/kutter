# ============================================================
# FAQ
# ============================================================
[faqHead]
title = "Frequently asked"
body  = "kutter is early and moving fast — this is where it stands today."

[[faqs]]
open = true
q    = "What is kutter for?"
a    = "Automated, typeset lower thirds. It's a full fixed-track editor, but the thing it's built to do well is take a batch of name/title cards, typeset them with the texish engine, and fade them over footage — the kind of thing you'd otherwise redraw by hand for every clip."

[[faqs]]
q = "Is it ready to use?"
a = "It's early and open source, under active development. The timeline, bin, tracks, dual monitors, and audio-mastered playback all work; a lot is still moving. Follow along or contribute on GitHub."

[[faqs]]
q = "What does it run on?"
a = "kutter is a single Scala Native binary. It links against Homebrew MLT (libmlt-7), SDL3, cairo, freetype, and librsvg — the shared libraries the bindings use. Development is on macOS today."

[[faqs]]
q = "How are the lower thirds typeset?"
a = "Through texish, a TeX-style typesetting engine. Cards are set as real type rather than drawn as bitmaps, so name/title lower thirds come out crisp and consistent across a whole batch."

[[faqs]]
q = "Is it free?"
a = "Yes — kutter is open source. The full source is on GitHub."

