# ============================================================
# Features
# ============================================================
[featuresHead]
title = "A real timeline, pointed at one job"
body  = "Everything a fixed-track editor needs to sequence footage — and a lower-thirds layer riding on top of it, typeset instead of hand-drawn."

[[features]]
icon  = "🎬"
title = "Fixed-track NLE"
body  = "Import media into a bin, then place it on tracks — V1/V2 composited top-down, A1/A2 mixed. The whole stack compiles to an MLT tractor for playback and export."

[[features]]
icon  = "🔤"
title = "Typeset lower thirds"
body  = "Name/title cards are set by the texish engine, not drawn by hand. Import a batch from a .klt list or add them one at a time; each rides its own layer over the footage, faded in and out."

[[features]]
icon  = "🔊"
title = "Audio is the master clock"
body  = "Each MLT frame carries picture and sound, decoded on its own thread. The decode thread holds every picture until the device has played its audio, so video follows sound instead of drifting off a wall clock."

[[features]]
icon  = "🧵"
title = "Off the UI thread"
body  = "The per-frame cost lives where it belongs — off the UI thread. Decoded YUV planes are handed to a video widget and uploaded to a texture; the renderer does YUV→RGB in the blit's shader, no CPU conversion."

[[features]]
icon  = "🖥️"
title = "Dual monitors"
body  = "A clip monitor beside the project monitor, the way an editor expects — preview a bin clip and the sequenced timeline side by side."

[[features]]
icon  = "🦀"
title = "One native binary"
body  = "The whole app is a single Scala Native binary over the suit UI toolkit, decoding through MLT and playing audio through SDL3. No runtime, no bundler."

# ============================================================
# Code section — how the lower-thirds batch is driven
# ============================================================
[code]
title   = "Batch your lower thirds, don't draw them"
body    = "Point kutter at a list of name/title cards and it typesets each one through texish and lays it on the lower-thirds layer, timed over the footage. Add or nudge them by hand afterward."
lang    = "bash"
bullets = [
  "A .klt list is a batch of cards — name, title, and where each sits on the timeline",
  "Each card is typeset by texish, so type looks set, not drawn",
  "Cards ride their own layer over the track stack — reposition or re-time live",
]
snippet = """# a project opens with its lower-thirds layer ready
sbt "run interview.mp4"

# then import a batch, or add cards by hand in the timeline
# examples/lower-thirds.klt  ->  typeset + placed over V1"""

