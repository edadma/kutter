<!-- Shared SEO block for every juicer theme. The only theme-specific SEO is
     the JSON-LD schema, which each theme ships in its own `seo-jsonld.html`.
     Adjust SEO meta here; adjust structured data there.

     Description waterfall:
       1. .page.summary       (engine auto-derives this; see App.scala)
       2. .site.description   (only when the page summary is empty)

     Author meta:
       Pulled from `.page.author.name` (the first resolved author record).
       Author records are matched against `[[authors]]` in site.toml.

     Robots meta:
       Set `noindex: true` in a page's frontmatter to keep it out of
       search results. (Engine ALSO excludes it from sitemap.xml.)

     OpenGraph + Twitter:
       `ogTags` resolves image / description from frontmatter
       (ogImage/image then ogDescription/description/summary),
       falling back to site-wide ogImage / image.

     Atom feed discovery:
       Always emitted. Disable with `feeds = false` in site.toml. -->

{{ if .page.summary }}<meta name="description" content="{{ .page.summary }}">{{ else }}{{ if .site.description }}<meta name="description" content="{{ .site.description }}">{{ end }}{{ end }}
{{ if .page.permalink }}<link rel="canonical" href="{{ .page.permalink }}">{{ end }}
{{ if .page.author }}{{ if .page.author.name }}<meta name="author" content="{{ .page.author.name }}">{{ end }}{{ end }}
{{ if .page.noindex }}<meta name="robots" content="noindex">{{ end }}

{{ ogTags .page }}

<link rel="alternate" type="application/atom+xml" title="{{ .site.title }}" href="{{ relURL '/feed.xml' }}">

{{ partial 'hreflang' . }}

{{ partial 'seo-jsonld' . }}
