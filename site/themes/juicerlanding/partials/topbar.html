<!-- Landing-theme topbar: brand on the left, optional secondary nav,
     optional GitHub link if .site.repoURL is set, and a primary CTA
     mirrored from .site.topbarCta (or [hero].primaryCta as fallback)
     so the "start free" / "get it" button is reachable from any page,
     not just the hero. Theme-toggle button reuses the localStorage key
     read by head.html's pre-paint script. -->
<header class="juicerlanding-topbar">
  <div class="juicerlanding-topbar-inner">
    <a class="juicerlanding-brand" href="{{ relURL '/' }}">
      {{ if .site.juicerlanding.logo }}<img class="juicerlanding-brand-logo" src="{{ relURL .site.juicerlanding.logo }}" alt="">{{ end }}
      <span class="juicerlanding-brand-name">{{ .site.title }}</span>
    </a>

    {{ if .site.topnav }}
    <nav class="juicerlanding-nav" aria-label="Main">
      {{ for n <- .site.topnav }}<a href="{{ if n.url }}{{ relURL n.url }}{{ else }}#{{ end }}">{{ n.label }}</a>{{ end }}
    </nav>
    {{ end }}

    <div class="juicerlanding-topbar-actions">
      {{ if .site.repoURL }}<a class="juicerlanding-icon-link" href="{{ .site.repoURL }}" aria-label="Source on GitHub" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.27-.01-1.16-.02-2.11-3.2.69-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18.91-.25 1.89-.38 2.86-.39.97.01 1.95.14 2.86.39 2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.39-5.27 5.68.41.36.78 1.06.78 2.13 0 1.54-.01 2.78-.01 3.16 0 .31.21.68.8.56C20.22 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
      </a>{{ end }}
      <button class="juicerlanding-theme-toggle" type="button" data-juicer-theme-toggle aria-label="Toggle theme">
        <svg class="juicerlanding-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="juicerlanding-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      {{ if .site.topbarCta }}<a class="juicerlanding-topbar-cta" href="{{ .site.topbarCta.url }}">{{ .site.topbarCta.label }}</a>{{ end }}
    </div>
  </div>
</header>

{{ partial 'dark-mode-toggle' . }}
