<!-- Trust bar. site.toml:
       [[trust]]
       logo = "/img/logos/acme.svg"
       alt  = "Acme"
       url  = "https://acme.example/"   # optional

     Renders a small "trusted by" / "as featured in" strip with logos.
     Stage-2/3 polish; Stage 1 leaves it disabled by default (no [[trust]]
     in the demo site.toml) so it doesn't render. -->
{{ if .site.trust }}
<section id="trust" class="juicerlanding-trust">
  <div class="juicerlanding-trust-inner">
    {{ if .site.trustLabel }}<p class="juicerlanding-trust-label">{{ .site.trustLabel }}</p>{{ else }}<p class="juicerlanding-trust-label">Trusted by teams at</p>{{ end }}
    <ul class="juicerlanding-trust-list">
      {{ for t <- .site.trust }}
      <li>
        {{ if t.url }}<a href="{{ t.url }}" rel="noopener">{{ end }}
          <img src="{{ relURL t.logo }}" alt="{{ if t.alt }}{{ t.alt }}{{ else }}Logo{{ end }}" loading="lazy">
        {{ if t.url }}</a>{{ end }}
      </li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
